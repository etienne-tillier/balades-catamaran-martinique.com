<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Ocean background -->
  <circle cx="16" cy="16" r="16" fill="#0EA5B0"/>
  <!-- Catamaran sail (white triangle) -->
