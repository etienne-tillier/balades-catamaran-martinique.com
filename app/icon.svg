  <!-- Hull -->
  <rect x="5" y="24" width="22" height="3" rx="1.5" fill="#F59E0B"/>
  <!-- Two hulls below -->
  <rect x="6" y="26.5" width="8" height="2" rx="1" fill="#0D2B33" opacity="0.7"/>
  <rect x="18" y="26.5" width="8" height="2" rx="1" fill="#0D2B33" opacity="0.7"/>
</svg>
